name: Build Test

on:
  workflow_dispatch:
    inputs:
      machine:
        description: 'Machine to build (hd51, hd60, zgemmah7)'
        required: true
        default: 'hd51'

permissions:
  contents: read
  issues: write

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Flash backend preflight smoke
        run: |
          make flash-preflight-smoke

      - name: Install linting tools
        run: |
          python3 -m pip install --upgrade pip
          pip install oelint-adv

      - name: Check Python CLI syntax
        run: |
          python3 -m py_compile cli.py

      - name: Check shell scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh || true  # Warning only for now

      - name: Lint BitBake recipes (when meta-layers exist)
        run: |
          if [ -d "meta-tuxbox" ]; then
            oelint-adv meta-tuxbox/ || true
          fi
        continue-on-error: true

  parse-test:
    name: BitBake Parse Test
    runs-on: ubuntu-22.04
    needs: preflight
    strategy:
      matrix:
        machine: [hd51, hd60, zgemmah7]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gawk wget git diffstat unzip texinfo \
            gcc g++ build-essential chrpath socat cpio python3 python3-pip \
            python3-pexpect xz-utils debianutils iputils-ping python3-git \
            python3-jinja2 python3-subunit zstd liblz4-tool file locales libacl1 curl

      - name: Initialize build environment
        run: |
          ./cli.py init

      - name: Parse BitBake recipes
        run: |
          # TODO: Implement bitbake -p test
          echo "BitBake parse test for ${{ matrix.machine }}"
          # bitbake -p would go here once build system is complete

  smoke-build:
    name: Smoke Build Test
    runs-on: ubuntu-22.04
    needs: preflight
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        machine: [hd51]  # Only one machine for PR smoke tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gawk wget git diffstat unzip texinfo \
            gcc g++ build-essential chrpath socat cpio python3 python3-pip \
            python3-pexpect xz-utils debianutils iputils-ping python3-git \
            python3-jinja2 python3-subunit zstd liblz4-tool file locales libacl1 curl

      - name: Configure locale
        run: |
          sudo locale-gen en_US.UTF-8
          sudo update-locale LANG=en_US.UTF-8

      - name: Initialize build environment
        run: |
          ./cli.py check
          ./cli.py init

      - name: Build image (smoke test)
        run: |
          # TODO: Implement actual build
          # ./cli.py build --machine ${{ matrix.machine }} --ci-mode
          echo "Smoke build for ${{ matrix.machine }}"
        timeout-minutes: 240  # 4 hours max

      - name: Check build artifacts
        run: |
          # TODO: Verify image was created
          # ls -lh build/tmp/deploy/images/${{ matrix.machine }}/
          echo "Checking artifacts for ${{ matrix.machine }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: image-${{ matrix.machine }}
          path: build/tmp/deploy/images/${{ matrix.machine }}/
          retention-days: 7

      - name: Scan build logs for critical patterns
        if: always()
        id: scan_logs
        run: |
          set -euo pipefail
          ./scripts/scan-build-log.sh \
            --glob "build*/build/tmp-*/log/cooker/*/*.log" \
            --report "build-log-scan-${{ matrix.machine }}.md" \
            --metrics "build-log-scan-${{ matrix.machine }}.env" \
            --allow-missing \
            --no-fail-on-critical
          critical_count="$(awk -F= '/^critical_count=/{print $2}' "build-log-scan-${{ matrix.machine }}.env")"
          critical_fingerprint="$(awk -F= '/^critical_fingerprint=/{print $2}' "build-log-scan-${{ matrix.machine }}.env")"
          log_path="$(awk -F= '/^log_path=/{print $2}' "build-log-scan-${{ matrix.machine }}.env")"
          echo "critical_count=${critical_count}" >> "${GITHUB_OUTPUT}"
          echo "critical_fingerprint=${critical_fingerprint}" >> "${GITHUB_OUTPUT}"
          echo "log_path=${log_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload build log scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-scan-${{ matrix.machine }}
          path: |
            build-log-scan-${{ matrix.machine }}.md
            build-log-scan-${{ matrix.machine }}.env
          retention-days: 14

      - name: Open issue for critical build log findings
        if: always() && vars.ENABLE_AUTO_ISSUES == '1' && steps.scan_logs.outputs.critical_count != '0'
        uses: actions/github-script@v7
        env:
          MACHINE: ${{ matrix.machine }}
          CRITICAL_COUNT: ${{ steps.scan_logs.outputs.critical_count }}
          CRITICAL_FINGERPRINT: ${{ steps.scan_logs.outputs.critical_fingerprint }}
          LOG_PATH: ${{ steps.scan_logs.outputs.log_path }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fp = process.env.CRITICAL_FINGERPRINT || "none";
            const labelName = "build-log-critical";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `[build-log-critical] ${process.env.MACHINE} ${fp.slice(0, 12)}`;
            const body = [
              "Critical build log patterns were detected.",
              "",
              `- workflow: ${context.workflow}`,
              `- job: ${context.job}`,
              `- machine: ${process.env.MACHINE}`,
              `- critical_count: ${process.env.CRITICAL_COUNT}`,
              `- fingerprint: ${fp}`,
              `- log_path: ${process.env.LOG_PATH}`,
              `- run: ${runUrl}`
            ].join("\n");

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: "B60205",
                description: "Critical patterns detected in build logs"
              });
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: labelName,
              per_page: 100
            });

            const existing = issues.find((issue) =>
              issue.body && issue.body.includes(`- fingerprint: ${fp}`)
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `New detection in run ${runUrl}`
              });
              core.info(`Existing issue found: #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [labelName]
              });
              core.info(`Created issue #${created.data.number}`);
            }

  check-upgrades:
    name: Check Package Upgrades
    runs-on: ubuntu-22.04
    needs: preflight
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git
          # pip install devtool requirements if needed

      - name: Check for recipe upgrades
        run: |
          # TODO: Implement upgrade check
          # devtool check-upgrade-status
          echo "Checking for package upgrades"
        continue-on-error: true

      - name: Post upgrade report
        run: |
          echo "Upgrade check report would be posted here"
