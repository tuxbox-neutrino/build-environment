name: Nightly Build

on:
  workflow_dispatch:
    inputs:
      machines:
        description: 'Comma-separated list of machines to build'
        required: false
        default: 'hd51,hd60,zgemmah7'

permissions:
  contents: read
  issues: write

jobs:
  build-matrix:
    name: Build ${{ matrix.machine }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        machine:
          - hd51
          - hd60
          - hd61
          - zgemmah7
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker system prune -af
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gawk wget git diffstat unzip texinfo \
            gcc g++ build-essential chrpath socat cpio python3 python3-pip \
            python3-pexpect xz-utils debianutils iputils-ping python3-git \
            python3-jinja2 python3-subunit zstd liblz4-tool file locales libacl1 curl

      - name: Configure system
        run: |
          sudo locale-gen en_US.UTF-8
          sudo update-locale LANG=en_US.UTF-8
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: downloads
          key: downloads-${{ hashFiles('**/recipes-*/**/*.bb') }}
          restore-keys: |
            downloads-

      - name: Cache sstate
        uses: actions/cache@v4
        with:
          path: sstate-cache
          key: sstate-${{ matrix.machine }}-${{ github.sha }}
          restore-keys: |
            sstate-${{ matrix.machine }}-
            sstate-

      - name: Initialize build
        run: |
          ./cli.py check
          ./cli.py init

      - name: Build image
        run: |
          # TODO: Implement actual build
          # ./cli.py build --machine ${{ matrix.machine }}
          echo "Building for ${{ matrix.machine }}"
        timeout-minutes: 360  # 6 hours max

      - name: Verify image artifacts
        run: |
          # TODO: Check image size, format, completeness
          # ./scripts/verify-image.sh ${{ matrix.machine }}
          echo "Verifying artifacts for ${{ matrix.machine }}"

      - name: Generate build report
        run: |
          # TODO: Generate detailed build report
          # - Build time
          # - Image size
          # - Package count
          # - Dependency graph diff from previous build
          echo "Build report for ${{ matrix.machine }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.machine }}-${{ github.run_number }}
          path: |
            build/tmp/deploy/images/${{ matrix.machine }}/*.zip
            build/tmp/deploy/images/${{ matrix.machine }}/*.manifest
          retention-days: 30

      - name: Upload to release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/tmp/deploy/images/${{ matrix.machine }}/*.zip

      - name: Scan build logs for critical patterns
        if: always()
        id: scan_logs
        run: |
          set -euo pipefail
          ./scripts/scan-build-log.sh \
            --glob "build*/build/tmp-*/log/cooker/*/*.log" \
            --report "build-log-scan-${{ matrix.machine }}.md" \
            --metrics "build-log-scan-${{ matrix.machine }}.env" \
            --allow-missing \
            --no-fail-on-critical
          critical_count="$(awk -F= '/^critical_count=/{print $2}' "build-log-scan-${{ matrix.machine }}.env")"
          critical_fingerprint="$(awk -F= '/^critical_fingerprint=/{print $2}' "build-log-scan-${{ matrix.machine }}.env")"
          log_path="$(awk -F= '/^log_path=/{print $2}' "build-log-scan-${{ matrix.machine }}.env")"
          echo "critical_count=${critical_count}" >> "${GITHUB_OUTPUT}"
          echo "critical_fingerprint=${critical_fingerprint}" >> "${GITHUB_OUTPUT}"
          echo "log_path=${log_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload build log scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-scan-${{ matrix.machine }}-${{ github.run_number }}
          path: |
            build-log-scan-${{ matrix.machine }}.md
            build-log-scan-${{ matrix.machine }}.env
          retention-days: 30

      - name: Open issue for critical build log findings
        if: always() && vars.ENABLE_AUTO_ISSUES == '1' && steps.scan_logs.outputs.critical_count != '0'
        uses: actions/github-script@v7
        env:
          MACHINE: ${{ matrix.machine }}
          CRITICAL_COUNT: ${{ steps.scan_logs.outputs.critical_count }}
          CRITICAL_FINGERPRINT: ${{ steps.scan_logs.outputs.critical_fingerprint }}
          LOG_PATH: ${{ steps.scan_logs.outputs.log_path }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fp = process.env.CRITICAL_FINGERPRINT || "none";
            const labelName = "build-log-critical";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const title = `[build-log-critical] ${process.env.MACHINE} ${fp.slice(0, 12)}`;
            const body = [
              "Critical build log patterns were detected.",
              "",
              `- workflow: ${context.workflow}`,
              `- job: ${context.job}`,
              `- machine: ${process.env.MACHINE}`,
              `- critical_count: ${process.env.CRITICAL_COUNT}`,
              `- fingerprint: ${fp}`,
              `- log_path: ${process.env.LOG_PATH}`,
              `- run: ${runUrl}`
            ].join("\n");

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: "B60205",
                description: "Critical patterns detected in build logs"
              });
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: labelName,
              per_page: 100
            });

            const existing = issues.find((issue) =>
              issue.body && issue.body.includes(`- fingerprint: ${fp}`)
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `New detection in run ${runUrl}`
              });
              core.info(`Existing issue found: #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [labelName]
              });
              core.info(`Created issue #${created.data.number}`);
            }

  post-build:
    name: Post-Build Report
    runs-on: ubuntu-22.04
    needs: build-matrix
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Nightly Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # TODO: Add build matrix results
          echo "Build results would be summarized here" >> $GITHUB_STEP_SUMMARY
