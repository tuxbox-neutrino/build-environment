#@TYPE: Machine
#@NAME: Coolstream Zee² / Trinity V2 (kronos, uClibc toolchain)
#@DESCRIPTION: Coolstream Zee² / Trinity V2 (HD2, Cortex-A9, uClibc/external toolchain)

require conf/machine/include/arm/armv7a/tune-cortexa9.inc

# Coolstream toolchain is built with --with-float=hard
DEFAULTTUNE = "cortexa9hf-neon"

SOC_FAMILY = "coolstream"
MACHINE_FEATURES = "screen usbhost usbgadget ext2 nfs"

# uClibc external toolchain for HD2 generation
TCLIBC ?= "uclibc"
TCMODE ?= "external-coolstream"

# uClibc is not compatible with systemd - init system is auto-selected in distro config
DISTRO_FEATURES:remove = "systemd"

IMAGE_FSTYPES ?= "tar.gz"
KERNEL_IMAGETYPE ?= "zImage"

SERIAL_CONSOLES ?= "115200;ttyAS0"

PREFERRED_PROVIDER_virtual/kernel ?= "linux-coolstream"
PREFERRED_VERSION_virtual/kernel ?= "3.10.93"

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += "cst-drivers"

MACHINEOVERRIDES =. "${MACHINE}:coolstream:coolstream-hd2:kronos:"
