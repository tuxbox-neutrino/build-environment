#@TYPE: Machine
#@NAME: Coolstream HD1/NEO/ZEE/NEO2 (Nevis, glibc)
#@DESCRIPTION: Coolstream HD1/NEO/ZEE/NEO2/NEO2 Twin (ARM1176, glibc)

require conf/machine/include/arm/armv6/tune-arm1176jz-s.inc

SOC_FAMILY = "coolstream"
MACHINE_FEATURES = "screen usbhost usbgadget ext2 nfs"

# glibc toolchain (default)
TCLIBC ?= "glibc"
TCMODE ?= "default"

IMAGE_FSTYPES ?= "tar.gz"
KERNEL_IMAGETYPE ?= "zImage"

SERIAL_CONSOLES ?= "115200;ttyAS0"

PREFERRED_PROVIDER_virtual/kernel ?= "linux-coolstream"
# HD1 bleibt auf 2.6.34.13 wegen Treiber-Kompatibilität; 2.6.34.15 steht optional bereit.
PREFERRED_VERSION_virtual/kernel ?= "2.6.34.13"

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += "cst-drivers"
MACHINE_EXTRA_RRECOMMENDS += "cst-drivers-extra"

MACHINEOVERRIDES =. "${MACHINE}:coolstream:coolstream-hd1:nevis:"
