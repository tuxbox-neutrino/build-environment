#@TYPE: Machine
#@NAME: Coolstream Trinity (shiner, uClibc toolchain)
#@DESCRIPTION: Coolstream Trinity V1 (HD2, Cortex-A9, uClibc/external toolchain)

require conf/machine/include/tune-cortexa9hf-neon.inc

SOC_FAMILY = "coolstream"
MACHINE_FEATURES = "screen usbhost usbgadget ext2 nfs"

# uClibc external toolchain for HD2 generation
TCLIBC ?= "uclibc"
TCMODE ?= "external-coolstream"

IMAGE_FSTYPES ?= "tar.gz"
KERNEL_IMAGETYPE ?= "zImage"

SERIAL_CONSOLES ?= "115200;ttyAS0"

MACHINEOVERRIDES =. "${MACHINE}:coolstream:coolstream-hd2:shiner:"
