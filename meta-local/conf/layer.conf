# Layer configuration for meta-local
# User customization layer for Tuxbox-OS

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes*/*/*.bb \
            ${LAYERDIR}/recipes*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-local"
BBFILE_PATTERN_meta-local := "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-local = "15"

LAYERSERIES_COMPAT_meta-local = "kirkstone"

# Dependencies
LAYERDEPENDS_meta-local = "core"

# Remove OE-Alliance legacy Python 2 requirements (not needed for Neutrino)
HOSTTOOLS:remove = "python python2 python2.7 sshpass"

# Disable PACKAGE_ARCHS sanity check
# OE-Alliance machine configs set DEFAULTTUNE before including tune files,
# causing tune-specific PACKAGE_EXTRA_ARCHS overrides to not apply.
# This is a known incompatibility between OE-Alliance and standard Yocto workflow.
# Disable the sanity check that fails during bitbake -p
INHERIT:remove = "sanity"

# Mask OE-Alliance recipes not needed for Neutrino builds (Enigma2-specific)
# Use absolute paths and comprehensive patterns
BBMASK .= "|.*/oe-alliance/meta-oe/recipes-distros/"
BBMASK .= "|.*/oe-alliance/meta-oe/recipes-oe-alliance/enigma2.*"
BBMASK .= "|.*/oe-alliance/.*kodi.*"
BBMASK .= "|.*/oe-alliance/meta-oe/recipes-multimedia/gstreamer1.0/.*dvbmediasink.*"
# Mask brand-specific Kodi recipes (breaks parsing without SRCREV_FORMAT)
BBMASK .= "|.*/meta-brands/.*/recipes-kodi/.*"
