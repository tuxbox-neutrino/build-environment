# HD51 machine configuration overrides for Tuxbox-OS
# Fixes PACKAGE_ARCHS sanity check for Kirkstone

# OE-Alliance sets DEFAULTTUNE before including tune files, causing
# PACKAGE_EXTRA_ARCHS tune-specific overrides to not apply.
# Explicitly set the package architecture list for cortexa15hf-neon-vfpv4.

require conf/machine/include/arm/arch-armv7ve.inc

# Explicitly construct PACKAGE_EXTRA_ARCHS for cortexa15hf-neon-vfpv4 tune
# Based on poky/meta/conf/machine/include/arm/armv7a/tune-cortexa15.inc
PACKAGE_EXTRA_ARCHS = "all any noarch allarch armv4 armv4t armv5te armv6 armv6hf armv7a armv7ahf armv7ve armv7vehf armv7vehf-vfp armv7vehf-neon armv7vehf-neon-vfpv4 cortexa15hf-vfp cortexa15hf-neon cortexa15hf-neon-vfpv4"
