# Tuxbox-OS uClibc Distribution Configuration
#
# Distribution for Coolstream Tank and other uClibc-based devices

# Inherit base Tuxbox configuration
require conf/distro/tuxbox.conf

# Distribution identity override
DISTRO_NAME = "Tuxbox-OS uClibc"
DISTRO_VERSION:append = "-uclibc"

# C Library
TCLIBC = "uclibc"
TCMODE = "external-coolstream"

# Disable systemd features incompatible with uClibc
DISTRO_FEATURES:remove = "systemd-resolved"

# Kernel version for Coolstream
PREFERRED_VERSION_linux-coolstream ?= "3.10.93"

# Toolchain configuration
EXTERNAL_TOOLCHAIN_ROOT ?= "${TOPDIR}/downloads/toolchain-coolstream-uclibc-armv7"
EXTERNAL_TOOLCHAIN_BIN ?= "${EXTERNAL_TOOLCHAIN_ROOT}/cross/arm-linux-3.10.93/bin"
EXTERNAL_TOOLCHAIN_SYSROOT ?= "${EXTERNAL_TOOLCHAIN_ROOT}/cross/arm-linux-3.10.93/arm-cortex-linux-uclibcgnueabi/sys-root"

# Target architecture
TARGET_ARCH = "arm"
TARGET_VENDOR = "-cortex"
TARGET_OS = "linux-uclibcgnueabi"

# Package exclusions for uClibc incompatibility
RDEPENDS:packagegroup-tuxbox-base:remove = "systemd-resolved"

# uClibc-specific optimizations
FULL_OPTIMIZATION = "-Os -pipe ${DEBUG_FLAGS}"
