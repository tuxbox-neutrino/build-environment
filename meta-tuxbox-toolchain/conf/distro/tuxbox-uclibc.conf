# Tuxbox-OS uClibc Distribution Configuration
#
# Distribution for Coolstream Tank and other uClibc-based devices

# Inherit base Tuxbox configuration
require conf/distro/tuxbox.conf

# Distribution identity override
DISTRO_NAME = "Tuxbox-OS uClibc"
DISTRO_VERSION:append = "-uclibc"

# C Library
TCLIBC = "uclibc"
TCMODE = "external-coolstream"

# Disable systemd features incompatible with uClibc
DISTRO_FEATURES:remove = "systemd-resolved"

# Kernel version for Coolstream
PREFERRED_VERSION_linux-coolstream ?= "3.10.93"

# Toolchain configuration (staged by external-toolchain-coolstream)
EXTERNAL_TOOLCHAIN_ROOT ?= "${STAGING_DIR_NATIVE}/usr/share/coolstream-toolchain/toolchain-coolstream-uclibc-armv7"
EXTERNAL_TOOLCHAIN_BIN ?= "${EXTERNAL_TOOLCHAIN_ROOT}/cross/arm-linux-3.10.93/bin"
EXTERNAL_TOOLCHAIN_SYSROOT ?= "${EXTERNAL_TOOLCHAIN_ROOT}/cross/arm-linux-3.10.93/arm-cortex-linux-uclibcgnueabi/sys-root"

# Target architecture
TARGET_ARCH = "arm"
TARGET_VENDOR = "-cortex"
TARGET_OS = "linux-uclibcgnueabi"

# External toolchain provides libc/crypt; use target providers for iconv/intl
PREFERRED_PROVIDER_virtual/libc = "external-toolchain-coolstream"
PREFERRED_PROVIDER_virtual/crypt = "external-toolchain-coolstream"
PREFERRED_PROVIDER_virtual/libintl = "proxy-libintl"
PREFERRED_PROVIDER_virtual/libiconv = "libiconv"

# Package exclusions for uClibc incompatibility
RDEPENDS:packagegroup-tuxbox-base:remove = "systemd-resolved"

# uClibc-specific optimizations
FULL_OPTIMIZATION = "-Os -pipe ${DEBUG_FLAGS}"

# QA: skip arch check because linux-uclibcgnueabi is not in oe.elf.machine_dict
INSANE_SKIP:append = " arch"

# GCC 6.x does not support -fmacro-prefix-map, keep only debug-prefix-map
DEBUG_PREFIX_MAP = "-fdebug-prefix-map=${WORKDIR}=/usr/src/debug/${PN}/${EXTENDPE}${PV}-${PR} \
                     -fdebug-prefix-map=${STAGING_DIR_HOST}= \
                     -fdebug-prefix-map=${STAGING_DIR_NATIVE}= \
"

# External toolchain: avoid SDK/cross-canadian packagegroups
TOOLCHAIN_HOST_TASK = ""
TOOLCHAIN_HOST_TASK_ATTEMPTONLY = ""
TOOLCHAIN_TARGET_TASK = ""
TOOLCHAIN_TARGET_TASK_ATTEMPTONLY = ""

# Default host SDK architecture (SDKs are not built by default, but sanity needs a valid value)
SDKMACHINE ?= "x86_64"
