# Layer configuration for meta-tuxbox-toolchain
#
# External toolchain support for Tuxbox-OS (e.g., Coolstream uClibc)

# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "tuxbox-toolchain"
BBFILE_PATTERN_tuxbox-toolchain := "^${LAYERDIR}/"
BBFILE_PRIORITY_tuxbox-toolchain = "9"

# Layer compatibility
LAYERSERIES_COMPAT_tuxbox-toolchain = "kirkstone"

# Layer dependencies
LAYERDEPENDS_tuxbox-toolchain = "core tuxbox"

# Layer information
LAYERVERSION_tuxbox-toolchain = "1"
LAYER_CONF_VERSION ?= "1"
