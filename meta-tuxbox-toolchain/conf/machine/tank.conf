#@TYPE: Machine
#@NAME: Coolstream Tank
#@DESCRIPTION: Machine configuration for Coolstream Tank (ARM Cortex-A9, uClibc)

# Include common Coolstream settings
require conf/machine/include/coolstream-common.inc

# Machine identification
MACHINE_NAME = "Coolstream Tank"

# Machine features
MACHINE_FEATURES = " \
    wifi \
    bluetooth \
    usbhost \
    hdmi \
    dvb-s \
    dvb-s2 \
    ci \
    alsa \
"

# Kernel
PREFERRED_PROVIDER_virtual/kernel = "linux-coolstream"
PREFERRED_VERSION_linux-coolstream = "3.10.93"

# Bootloader
PREFERRED_PROVIDER_virtual/bootloader = "u-boot-coolstream"

# Architecture
DEFAULTTUNE = "armv7ahf-neon"
require conf/machine/include/arm/armv7a/tune-cortexa9.inc

# Console
SERIAL_CONSOLES = "115200;ttyS0"

# Image
MACHINE_ESSENTIAL_EXTRA_RDEPENDS = " \
    kernel-modules \
    firmware-coolstream \
"

MACHINE_EXTRA_RDEPENDS = " \
    coolstream-drivers \
    libstb-hal-coolstream \
"

# Display
MACHINE_LCD_DISPLAY = "textlcd"

# Flash layout
FLASHSIZE = "128"
KERNEL_DEVICETREE = "coolstream-tank.dtb"

# Image format
IMAGE_FSTYPES = "tar.bz2 ext4"

# Kernel image type
KERNEL_IMAGETYPE = "zImage"
KERNEL_ALT_IMAGETYPE = "uImage"

# U-Boot configuration
UBOOT_MACHINE = "coolstream_tank_config"
UBOOT_ENTRYPOINT = "0x80008000"
UBOOT_LOADADDRESS = "0x80008000"

# Root filesystem
IMAGE_ROOTFS_SIZE ?= "262144"
